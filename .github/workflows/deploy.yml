name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code 📄
        uses: actions/checkout@v4

      - name: Setup Java ☕
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 💙
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies 📦
        run: flutter pub get

      - name: Build Web Application 🌐
        run: flutter build web --base-href "/upscLearnAdmin/"

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
